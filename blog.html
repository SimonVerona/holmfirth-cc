<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Writeups — Holmfirth Cycling Club</title>
  <meta name="description" content="Ride reports and writeups from Holmfirth Cycling Club — stories from the road, the hills and the café stops of the Holme Valley.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    [data-reveal] { opacity: 0; transform: translateY(24px); transition: opacity 0.55s ease, transform 0.55s ease; }
    [data-reveal].revealed { opacity: 1; transform: none; }
    [data-reveal-delay="1"] { transition-delay: 0.15s; }

    /* ── Blog grid ── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      margin-top: 8px;
    }
    .blog-card {
      background: var(--white);
      border: 1px solid var(--offwhite);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .blog-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .blog-card-img {
      height: 180px;
      background-color: var(--offwhite);
      background-size: cover;
      background-position: center;
    }
    .blog-card-img--placeholder {
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 12px,
          rgba(212,43,43,0.07) 12px,
          rgba(212,43,43,0.07) 13px
        );
    }
    .blog-card-body {
      padding: 20px 24px 24px;
    }
    .blog-card-date {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
    }
    .blog-card-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .blog-card-title a {
      color: var(--black);
      text-decoration: none;
    }
    .blog-card-title a:hover { color: var(--red); }
    .blog-card-stats {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--gray);
      margin-bottom: 10px;
    }
    .blog-card-excerpt {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.6;
    }

    /* ── Skeleton ── */
    .skeleton-pulse {
      background: linear-gradient(90deg, var(--offwhite) 25%, var(--light) 50%, var(--offwhite) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.4s ease infinite;
      border-radius: var(--radius);
    }
    @keyframes skeleton-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .blog-card-skeleton { height: 300px; }

    /* ── Error / empty ── */
    .rwgps-error {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: #fff3f3;
      border-left: 3px solid var(--red);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 14px;
      color: var(--gray);
    }
    .rwgps-retry-btn {
      background: none;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .rwgps-empty { padding: 32px 0; color: var(--gray); font-size: 14px; }
    .rwgps-load-more { margin-top: 40px; text-align: center; }
  </style>
</head>
<body data-page="blog">

<div data-component="nav"></div>

<div class="page-hero">
  <div class="page-hero-pattern"></div>
  <div class="page-hero-content">
    <div class="section-label">From the road</div>
    <h1>Ride<br>writeups</h1>
    <p>Stories from the Holme Valley, the hills beyond, and the café stops in between — drawn live from Ride With GPS.</p>
  </div>
</div>

<div style="padding: 80px 32px; background: var(--white);">
  <div style="max-width: var(--max-w); margin: 0 auto;">

    <div data-reveal>
      <div class="section-label">Recent rides</div>
      <h2 class="section-title">On the road with HCC</h2>
      <p class="section-body" style="max-width: 580px; margin-bottom: 48px;">
        Every completed club trip recorded on Ride With GPS appears here. Click through to see the route, photos, and stats.
      </p>
    </div>

    <!-- Live blog feed — populated by main.js → loadBlogPage() -->
    <div id="blog-list" data-reveal data-reveal-delay="1">
      <!-- Skeleton rendered here while loading -->
    </div>

  </div>
</div>

<div data-component="footer"></div>

<script src="js/components.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
